<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HalalTune</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body>

    <div id="auth-screen" class="fullscreen-view">
        <div class="auth-box">
            <h2>HalalTune</h2>
            <p>Sign in to continue</p>
            <button id="google-login-btn" class="yt-primary-btn google-btn">
                <i class="fa-brands fa-google"></i> Continue with Google
            </button>
        </div>
    </div>

    <div id="app-layout" class="yt-app-layout" style="display: none;">
        
        <div class="yt-main-content">
            
            <div class="yt-topbar">
                <div class="glass-search-wrapper">
                    <i class="fa-solid fa-search search-icon"></i>
                    <input type="text" id="glass-search" class="glass-search-bar" placeholder="Search nasheeds, artists...">
                </div>
                <button id="logout-btn" class="yt-icon-btn"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>

            <div class="yt-content-area">
                
                <h2 class="section-title">Recently Added</h2>
                <div class="yt-track-list" id="main-track-list">
                    <p style="color: #aaa;">Loading songs...</p>
                </div>

                <h2 class="section-title" style="margin-top: 30px;">Malayalam</h2>
                <div class="yt-track-list" id="malayalam-track-list">
                    <p style="color: #aaa;">Loading Malayalam tracks...</p>
                </div>
            </div>

            <div class="yt-bottom-player">
                <div class="yt-player-progress-container">
                    <input type="range" id="audio-progress" class="yt-slider" value="0" min="0" max="100">
                </div>
                <div class="yt-player-content">
                    <div class="yt-player-info">
                        <div class="yt-player-art"><img id="player-art" src="" style="display:none;"></div>
                        <div class="yt-player-text">
                            <h4 id="player-title">No track playing</h4>
                            <p id="player-artist">-</p>
                        </div>
                    </div>
                    <div class="yt-player-controls">
                        <button class="yt-ctrl-btn" id="prev-btn"><i class="fa-solid fa-backward-step"></i></button>
                        <button class="yt-ctrl-play" id="play-pause-btn"><i class="fa-solid fa-play"></i></button>
                        <button class="yt-ctrl-btn" id="next-btn"><i class="fa-solid fa-forward-step"></i></button>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <audio id="main-audio" style="display: none;"></audio>

    <script src="script.js"></script>
</body>
</html>
