<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HalalTune | Premium Halal Audio</title>
    <link rel="icon" href="icon.png">
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div id="mobile-overlay" class="overlay"></div>

    <div id="auth-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-modal-btn" id="close-modal-btn"><i class="fa-solid fa-xmark"></i></button>

            <div id="login-state" class="modal-state">
                <i class="fa-solid fa-circle-user modal-icon"></i>
                <h3>Welcome to HalalTune</h3>
                <p>Sign in to save playlists, like tracks, and upload content.</p>
                <button id="google-login-btn" class="modal-btn google-btn">
                    <i class="fa-brands fa-google"></i> Continue with Google
                </button>
            </div>

            <div id="profile-state" class="modal-state" style="display: none;">
                <img id="modal-profile-pic" src="" alt="Profile" class="modal-profile-img">
                <h3 id="modal-user-name">User Name</h3>
                <p id="modal-user-email">user@email.com</p>
                <button id="logout-btn" class="modal-btn logout-btn">Sign Out</button>
            </div>
        </div>
    </div>

    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <button id="close-menu-btn" class="close-btn"><i class="fa-solid fa-xmark"></i></button>
            <div class="brand">
                <img src="icon.png" alt="HalalTune Logo" class="brand-logo" onerror="this.src='https://via.placeholder.com/40/10b981/ffffff?text=HT'">
                <h2>HalalTune</h2>
            </div>

            <nav class="nav-links">
                <a href="#" class="nav-item active" data-view="home"><i class="fa-solid fa-house"></i> Home</a>
                <a href="#" class="nav-item" data-view="search"><i class="fa-solid fa-magnifying-glass"></i> Search</a>
                <a href="#" class="nav-item auth-required" data-view="library"><i class="fa-solid fa-book"></i> Your Library</a>
            </nav>

            <div class="nav-divider"></div>

            <nav class="nav-links">
                <a href="#" id="create-playlist-btn" class="auth-required"><i class="fa-solid fa-plus-square"></i> Create Playlist</a>
                <a href="#" class="nav-item auth-required" data-view="liked"><i class="fa-solid fa-heart" style="color: var(--emerald);"></i> Liked Songs</a>
                <a href="#" class="nav-item" data-view="albums"><i class="fa-solid fa-compact-disc"></i> Albums</a>
                <a href="#" id="upload-track-btn" class="auth-required" style="color: var(--gold); margin-top: 10px;">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Upload Track
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="nav-left">
                    <button id="menu-btn" class="menu-btn"><i class="fa-solid fa-bars"></i></button>
                    <div class="nav-arrows">
                        <button class="arrow-btn"><i class="fa-solid fa-chevron-left"></i></button>
                        <button class="arrow-btn"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                </div>
                <div class="user-profile" id="profile-trigger">
                    <div class="avatar-circle" id="top-bar-avatar">
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>
            </header>

            <section class="dynamic-section" id="dynamic-view">
                </section>
        </main>
    </div>

    <footer class="music-player" id="mini-player">
        <div class="progress-container">
            <input type="range" id="progress-bar" value="0" max="100">
        </div>

        <div class="player-content">
            <div class="now-playing">
                <div class="track-art" id="player-art">
                    <i class="fa-solid fa-music"></i>
                </div>
                <div class="track-info">
                    <h4 id="player-title">No track selected</h4>
                    <p id="player-artist">--</p>
                </div>
                <button class="like-btn auth-action" id="mini-like-btn" title="Save to Liked Songs"><i class="fa-regular fa-heart"></i></button>
            </div>

            <div class="player-controls-container">
                <div class="control-buttons">
                    <button id="play-btn" class="play-circle"><i class="fa-solid fa-circle-play"></i></button>
                </div>
            </div>

            <div class="player-actions">
                <button id="download-btn" class="auth-action" title="Download Track"><i class="fa-solid fa-download"></i></button>
            </div>
        </div>
    </footer>

    <div id="full-screen-player" class="fs-player">
        <div class="fs-header">
            <button id="close-fs-btn" class="fs-icon-btn"><i class="fa-solid fa-chevron-down"></i></button>
            <span class="fs-header-title">Now Playing</span>
            <button class="fs-icon-btn"><i class="fa-solid fa-ellipsis-vertical"></i></button>
        </div>

        <div class="fs-art-container">
            <div class="fs-art" id="fs-player-art">
                <i class="fa-solid fa-music"></i>
            </div>
        </div>

        <div class="fs-track-details">
            <div class="fs-info">
                <h2 id="fs-player-title">No track selected</h2>
                <p id="fs-player-artist">--</p>
            </div>
            <button class="like-btn auth-action fs-like-btn" id="fs-like-btn"><i class="fa-regular fa-heart"></i></button>
        </div>

        <div class="fs-progress-wrapper">
            <input type="range" id="fs-progress-bar" value="0" max="100">
            <div class="fs-time-row">
                <span id="fs-current-time">0:00</span>
                <span id="fs-total-time">0:00</span>
            </div>
        </div>

        <div class="fs-controls">
            <button id="fs-shuffle-btn" class="fs-secondary-control"><i class="fa-solid fa-shuffle"></i></button>
            <button id="fs-prev-btn" class="fs-main-control"><i class="fa-solid fa-backward-step"></i></button>
            <button id="fs-play-btn" class="fs-play-circle"><i class="fa-solid fa-circle-play"></i></button>
            <button id="fs-next-btn" class="fs-main-control"><i class="fa-solid fa-forward-step"></i></button>
            <button id="fs-repeat-btn" class="fs-secondary-control"><i class="fa-solid fa-repeat"></i></button>
        </div>

        <div class="fs-bottom-actions">
            <button id="fs-download-btn" class="auth-action fs-action-btn"><i class="fa-solid fa-download"></i> Download</button>
        </div>
    </div>

    <audio id="audio-element" src=""></audio>

    <script src="script.js"></script>
</body>
</html>
