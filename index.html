<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HalalTune</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body>

    <div id="auth-screen" class="fullscreen-view">
        <div class="auth-box">
            <h2>HalalTune</h2>
            <p>Sign in to continue</p>
            <button id="google-login-btn" class="yt-primary-btn google-btn">
                <i class="fa-brands fa-google"></i> Continue with Google
            </button>
        </div>
    </div>

    <div id="app-layout" class="yt-app-layout" style="display: none;">
        
        <div class="yt-main-content">
            <div class="yt-topbar">
                <div class="glass-search-wrapper">
                    <i class="fa-solid fa-search search-icon"></i>
                    <input type="text" id="glass-search" class="glass-search-bar" placeholder="Search nasheeds, artists...">
                </div>
                <button id="logout-btn" class="yt-icon-btn"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>

            <div class="yt-content-area">
                
                <h2 class="section-title">All Songs</h2>
                <div class="yt-track-list" id="main-track-list"><p style="color: #aaa;">Loading...</p></div>

                <h2 class="section-title" style="margin-top: 30px;">Malayalam</h2>
                <div class="yt-track-list" id="malayalam-track-list"><p style="color: #aaa;">Loading...</p></div>

                <h2 class="section-title" style="margin-top: 30px;">Liked Songs</h2>
                <div class="yt-track-list" id="liked-track-list"><p style="color: #aaa;">No liked songs yet.</p></div>
            </div>

            <div class="yt-bottom-player" id="mini-player">
                <div class="yt-player-progress-container">
                    <input type="range" id="mini-progress" class="yt-slider" value="0" min="0" max="100">
                </div>
                
                <div class="yt-player-content">
                    <div class="yt-player-info" id="mini-player-info">
                        <div class="yt-player-art"><img id="mini-player-art" src="" style="display:none;"></div>
                        <div class="yt-player-text">
                            <h4 id="mini-player-title">No track playing</h4>
                            <p id="mini-player-artist">-</p>
                        </div>
                    </div>
                    <div class="yt-player-controls">
                        <button class="yt-ctrl-btn" id="mini-prev-btn"><i class="fa-solid fa-backward-step"></i></button>
                        <button class="yt-ctrl-play" id="mini-play-pause-btn"><i class="fa-solid fa-play"></i></button>
                        <button class="yt-ctrl-btn" id="mini-next-btn"><i class="fa-solid fa-forward-step"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="fs-player" id="fs-player">
        <div class="fs-header">
            <button class="fs-icon-btn" id="close-fs-btn"><i class="fa-solid fa-chevron-down"></i></button>
            <div class="fs-header-title">NOW PLAYING</div>
            <button class="fs-icon-btn"><i class="fa-solid fa-ellipsis-vertical"></i></button>
        </div>

        <div class="fs-main-area">
            <div class="fs-art-wrapper">
                <img id="fs-art" src="" style="display:none;">
                <i class="fa-solid fa-music fs-art-placeholder" id="fs-placeholder"></i>
            </div>
        </div>

        <div class="fs-track-details">
            <div class="fs-info">
                <h2 id="fs-title">Song Title</h2>
                <p id="fs-artist">Artist Name</p>
            </div>
            <button class="fs-like-btn" id="fs-like-btn"><i class="fa-regular fa-heart"></i></button>
        </div>

        <div class="fs-progress-wrapper">
            <input type="range" id="fs-progress" class="yt-slider fs-slider" value="0" min="0" max="100">
            <div class="fs-time-row">
                <span id="fs-time-current">0:00</span>
                <span id="fs-time-total">0:00</span>
            </div>
        </div>

        <div class="fs-controls">
            <button class="fs-secondary-control"><i class="fa-solid fa-shuffle"></i></button>
            <button class="fs-main-control" id="fs-prev-btn"><i class="fa-solid fa-backward-step"></i></button>
            <button class="fs-play-circle" id="fs-play-pause-btn"><i class="fa-solid fa-circle-play"></i></button>
            <button class="fs-main-control" id="fs-next-btn"><i class="fa-solid fa-forward-step"></i></button>
            <button class="fs-secondary-control"><i class="fa-solid fa-repeat"></i></button>
        </div>
    </div>

    <audio id="main-audio" style="display: none;"></audio>

    <script src="script.js"></script>
</body>
</html>
